name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install -r ../requirements.txt

      - name: Run tests
        run: |
          cd ..
          pytest tests -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: transport-rag-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: transport-rag-ui/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build
